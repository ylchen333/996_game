<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A narrative sentence completion game with generated scene images." />
    <title>996</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Narrative sentence completion game">
      <header class="hud">
        <span>996.exe</span>
        <span id="attempt-label">ATTEMPT 01</span>
      </header>

      <section class="scene-frame" aria-label="Current scene">
        <div class="scanlines"></div>
        <img id="scene-image" alt="" />
        <div class="scene-overlay">
          <p id="scene-text" aria-live="polite">Loading story...</p>
          <p id="status-line" class="status-line" hidden></p>
        </div>
      </section>

      <form id="command-form" autocomplete="off" hidden>
        <label class="command-line" for="command-input">
          <span class="prompt-mark">&gt;</span>
          <input
            id="command-input"
            name="command"
            type="text"
            maxlength="40"
            placeholder="type one noun..."
            aria-describedby="input-hint"
            autofocus
          />
        </label>
        <p id="input-hint">Complete the sentence with one noun, then press Enter.</p>
      </form>

      <button id="action-button" type="button" hidden>CONTINUE</button>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
